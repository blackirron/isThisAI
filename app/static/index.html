<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IsThisAI — Text & Image Examiner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FBF9F4;
    --panel: #FFFFFF;
    --ink: #1C1C1C;
    --muted: #8A8578;
    --border: #E7E2D6;
    --stamp-ai: #B3261E;
    --stamp-human: #2F6B3E;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(0,0,0,0.035) 1px, transparent 0);
    background-size: 22px 22px;
    color: var(--ink);
    font-family: 'Lora', Georgia, serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 20px;
  }

  .case-file {
    width: 100%;
    max-width: 640px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 12px 28px rgba(28,28,28,0.06);
    padding: 40px 44px;
    position: relative;
    overflow: hidden;
  }

  .case-file::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: repeating-linear-gradient(90deg, var(--ink) 0 14px, transparent 14px 22px);
    opacity: 0.06;
  }

  .kicker {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0 0 6px;
  }

  .subhead {
    font-size: 14.5px;
    color: var(--muted);
    font-style: italic;
    margin: 0 0 22px;
  }

  /* Mode tabs */
  .mode-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .mode-tab {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--muted);
    padding: 10px 4px 12px;
    margin-right: 22px;
    cursor: pointer;
    position: relative;
    top: 1px;
  }
  .mode-tab.active {
    color: var(--ink);
    border-bottom: 2px solid var(--ink);
  }

  .panel[hidden] { display: none; }

  textarea {
    width: 100%;
    min-height: 200px;
    resize: vertical;
    font-family: 'Lora', Georgia, serif;
    font-size: 15.5px;
    line-height: 1.65;
    color: var(--ink);
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 18px 20px;
    outline: none;
    transition: border-color 0.2s ease;
  }
  textarea:focus { border-color: var(--ink); }
  textarea::placeholder { color: #B7B0A0; font-style: italic; }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }

  .char-count {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  .char-count.warn { color: var(--stamp-ai); }

  button.examine {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 13px 26px;
    border-radius: 3px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  button.examine:hover:not(:disabled) { background: #333; transform: translateY(-1px); }
  button.examine:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Image dropzone */
  .dropzone {
    border: 1.5px dashed var(--border);
    border-radius: 3px;
    background: var(--paper);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .dropzone.dragover { border-color: var(--ink); background: #F3F0E8; }
  .dropzone-title {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.03em;
    margin: 0 0 4px;
  }
  .dropzone-sub { font-size: 12px; color: var(--muted); font-style: italic; margin: 4px 0; }
  .dropzone-hint { font-size: 11.5px; color: var(--muted); margin-top: 10px; }

  .preview-wrap { text-align: center; }
  .preview-wrap img {
    max-width: 100%;
    max-height: 280px;
    border: 1px solid var(--border);
    border-radius: 3px;
  }
  .preview-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--muted);
    margin: 10px 2px;
  }
  .link-btn {
    background: none;
    border: none;
    color: var(--stamp-ai);
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0;
  }

  .verdict-zone {
    margin-top: 30px;
    min-height: 4px;
  }

  .error-box {
    border: 1px solid var(--stamp-ai);
    color: var(--stamp-ai);
    background: rgba(179, 38, 30, 0.06);
    padding: 14px 18px;
    border-radius: 3px;
    font-size: 14px;
  }

  .notice-box {
    border: 1px solid #C9A227;
    color: #7A5E00;
    background: rgba(201, 162, 39, 0.08);
    padding: 12px 16px;
    border-radius: 3px;
    font-size: 13px;
    margin-top: 14px;
  }

  .result {
    display: flex;
    align-items: center;
    gap: 22px;
    padding-top: 26px;
    border-top: 1px dashed var(--border);
  }

  .stamp {
    flex: none;
    width: 108px;
    height: 108px;
    border-radius: 50%;
    border: 3.5px solid var(--stamp-color);
    color: var(--stamp-color);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    text-align: center;
    transform: rotate(-9deg) scale(0.6);
    opacity: 0;
    animation: stampIn 0.45s cubic-bezier(.2,1.4,.4,1) forwards;
    animation-delay: 0.05s;
    position: relative;
  }
  .stamp::after {
    content: "";
    position: absolute;
    inset: 6px;
    border: 1px solid var(--stamp-color);
    border-radius: 50%;
    opacity: 0.5;
  }
  .stamp .verdict-word {
    font-size: 15px;
    letter-spacing: 0.03em;
    line-height: 1.15;
  }
  .stamp .confidence {
    font-family: 'Lora', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 11px;
    margin-top: 4px;
    opacity: 0.85;
  }

  @keyframes stampIn {
    0% { transform: rotate(-9deg) scale(0.6); opacity: 0; }
    60% { transform: rotate(-7deg) scale(1.08); opacity: 1; }
    100% { transform: rotate(-7deg) scale(1); opacity: 1; }
  }

  .verdict-copy .headline {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--stamp-color);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 6px;
  }
  .verdict-copy .reasoning {
    font-size: 14.5px;
    line-height: 1.6;
    color: #4A463D;
  }

  /* Forensic evidence (image mode only) */
  .evidence {
    margin-top: 18px;
    font-size: 13px;
  }
  .evidence summary {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
  }
  .evidence ul { margin: 12px 0 0; padding-left: 18px; }
  .evidence li { margin-bottom: 10px; line-height: 1.55; color: #4A463D; }
  .sig-strong { color: var(--stamp-ai); font-weight: 600; }
  .sig-moderate { color: #A9762C; font-weight: 600; }
  .sig-weak { color: var(--muted); font-weight: 600; }

  .footer-note {
    margin-top: 26px;
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    text-align: center;
  }

  @media (max-width: 480px) {
    .case-file { padding: 28px 24px; }
    .result { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="case-file">
  <div class="kicker">Case File · Digital Forensics</div>
  <h1>IsThisAI</h1>
  <p class="subhead">Paste text or upload an image. We'll examine the evidence and render a verdict.</p>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="text" type="button">Text</button>
    <button class="mode-tab" data-mode="image" type="button">Image</button>
  </div>

  <!-- TEXT MODE -->
  <div class="panel" data-panel="text">
    <textarea id="inputText" placeholder="Paste the paragraph you want examined here…"></textarea>

    <div class="row">
      <span class="char-count" id="charCount">0 / 6000</span>
      <button class="examine" id="examineTextBtn">Examine</button>
    </div>

    <div class="verdict-zone" id="textVerdictZone"></div>
  </div>

  <!-- IMAGE MODE -->
  <div class="panel" data-panel="image" hidden>
    <input type="file" id="imageFileInput" accept="image/png,image/jpeg,image/webp" hidden />

    <div class="dropzone" id="imageDropzone">
      <p class="dropzone-title">Drop an image here, or click to choose a file</p>
      <p class="dropzone-sub">PNG · JPG · WEBP</p>
      <p class="dropzone-hint">Max 8MB</p>
    </div>

    <div class="preview-wrap" id="imagePreviewWrap" hidden>
      <img id="imagePreview" alt="Selected image preview" />
      <div class="preview-meta">
        <span id="imageFilename"></span>
        <button class="link-btn" id="imageClearBtn" type="button">Remove</button>
      </div>
      <div class="row" style="justify-content:flex-end;">
        <button class="examine" id="examineImageBtn">Examine</button>
      </div>
    </div>

    <div class="verdict-zone" id="imageVerdictZone"></div>
  </div>

  <div class="footer-note">Judgment is probabilistic, not proof — treat it as a second opinion.</div>
</div>

<script>
  /* ---------- Mode tab switching ---------- */
  const modeTabs = document.querySelectorAll('.mode-tab');
  const panels = document.querySelectorAll('.panel');

  modeTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      modeTabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const mode = tab.dataset.mode;
      panels.forEach(p => { p.hidden = p.dataset.panel !== mode; });
    });
  });

  /* ---------- Shared stamp renderer ---------- */
  function renderStamp(zoneEl, { verdict, confidence, reasoning }) {
    const isAI = verdict === 'ai';
    const color = isAI ? 'var(--stamp-ai)' : 'var(--stamp-human)';
    const label = isAI ? 'AI-Generated' : 'Human-Made';
    const stampWord = isAI ? 'AI' : 'HUMAN';

    zoneEl.innerHTML = `
      <div class="result">
        <div class="stamp" style="--stamp-color:${color}">
          <span class="verdict-word">${stampWord}</span>
          <span class="confidence">${confidence}% conf.</span>
        </div>
        <div class="verdict-copy">
          <div class="headline" style="color:${color}">${label}</div>
          <div class="reasoning">${reasoning}</div>
        </div>
      </div>
    `;
  }

  function renderError(zoneEl, message) {
    zoneEl.innerHTML = `<div class="error-box">${message}</div>`;
  }

  /* ---------- TEXT MODE ---------- */
  const inputText = document.getElementById('inputText');
  const charCount = document.getElementById('charCount');
  const examineTextBtn = document.getElementById('examineTextBtn');
  const textVerdictZone = document.getElementById('textVerdictZone');

  const MAX_CHARS = 6000;
  const MIN_CHARS = 40;

  inputText.addEventListener('input', () => {
    const len = inputText.value.length;
    charCount.textContent = `${len} / ${MAX_CHARS}`;
    charCount.classList.toggle('warn', len > MAX_CHARS);
  });

  async function examineText() {
    const text = inputText.value.trim();

    if (text.length < MIN_CHARS) {
      renderError(textVerdictZone, `Paste at least ${MIN_CHARS} characters — too little text to judge reliably.`);
      return;
    }

    examineTextBtn.disabled = true;
    examineTextBtn.textContent = 'Examining…';
    textVerdictZone.innerHTML = '';

    try {
      const res = await fetch('/api/detect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Request failed (${res.status})`);
      }

      const data = await res.json();
      renderStamp(textVerdictZone, data);
    } catch (err) {
      renderError(textVerdictZone, err.message || 'Something went wrong during examination.');
    } finally {
      examineTextBtn.disabled = false;
      examineTextBtn.textContent = 'Examine';
    }
  }

  examineTextBtn.addEventListener('click', examineText);

  /* ---------- IMAGE MODE ---------- */
  const dropzone = document.getElementById('imageDropzone');
  const imageFileInput = document.getElementById('imageFileInput');
  const previewWrap = document.getElementById('imagePreviewWrap');
  const previewImg = document.getElementById('imagePreview');
  const filenameEl = document.getElementById('imageFilename');
  const clearBtn = document.getElementById('imageClearBtn');
  const examineImageBtn = document.getElementById('examineImageBtn');
  const imageVerdictZone = document.getElementById('imageVerdictZone');

  const MAX_IMAGE_BYTES = 8 * 1024 * 1024;
  const ALLOWED_TYPES = ['image/png', 'image/jpeg', 'image/webp'];
  let selectedFile = null;

  dropzone.addEventListener('click', () => imageFileInput.click());
  ['dragenter', 'dragover'].forEach(evt =>
    dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.add('dragover'); })
  );
  ['dragleave', 'drop'].forEach(evt =>
    dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.remove('dragover'); })
  );
  dropzone.addEventListener('drop', (e) => {
    const file = e.dataTransfer.files[0];
    if (file) handleFileSelected(file);
  });
  imageFileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) handleFileSelected(file);
  });

  function handleFileSelected(file) {
    imageVerdictZone.innerHTML = '';

    if (!ALLOWED_TYPES.includes(file.type)) {
      renderError(imageVerdictZone, 'Unsupported file type — please use PNG, JPG, or WEBP.');
      return;
    }
    if (file.size > MAX_IMAGE_BYTES) {
      renderError(imageVerdictZone, 'File too large — max size is 8MB.');
      return;
    }

    selectedFile = file;
    filenameEl.textContent = file.name;
    previewImg.src = URL.createObjectURL(file);
    dropzone.hidden = true;
    previewWrap.hidden = false;
  }

  clearBtn.addEventListener('click', () => {
    selectedFile = null;
    imageFileInput.value = '';
    previewImg.src = '';
    dropzone.hidden = false;
    previewWrap.hidden = true;
    imageVerdictZone.innerHTML = '';
  });

  async function examineImage() {
    if (!selectedFile) return;

    examineImageBtn.disabled = true;
    examineImageBtn.textContent = 'Examining…';
    imageVerdictZone.innerHTML = '';

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const res = await fetch('/api/detect-image', { method: 'POST', body: formData });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Request failed (${res.status})`);
      }

      const data = await res.json();
      renderStamp(imageVerdictZone, data);

      if (data.degraded_mode) {
        const notice = document.createElement('div');
        notice.className = 'notice-box';
        notice.textContent = '⚠️ The vision model was unavailable for this request — this verdict is based on file metadata only, with lower confidence.';
        imageVerdictZone.appendChild(notice);
      }

      if (data.forensic_signals && data.forensic_signals.length > 0) {
        const details = document.createElement('details');
        details.className = 'evidence';
        const summary = document.createElement('summary');
        summary.textContent = 'Why? See the underlying metadata evidence';
        details.appendChild(summary);

        const ul = document.createElement('ul');
        data.forensic_signals.forEach(sig => {
          const li = document.createElement('li');
          li.innerHTML = `<span class="sig-${sig.strength}">[${sig.strength}]</span> ${sig.label} — ${sig.detail}`;
          ul.appendChild(li);
        });
        details.appendChild(ul);
        imageVerdictZone.appendChild(details);
      }
    } catch (err) {
      renderError(imageVerdictZone, err.message || 'Something went wrong during examination.');
    } finally {
      examineImageBtn.disabled = false;
      examineImageBtn.textContent = 'Examine';
    }
  }

  examineImageBtn.addEventListener('click', examineImage);
</script>

</body>
</html>
